services:
  uniq-home:
    build:
      context: .
      args:
        VITE_BASE_PATH: ${VITE_BASE_PATH:-/}
        VITE_SITE_URL: ${VITE_SITE_URL:-https://uniq-home.com}
        VITE_WARRANTY_ACTIVATION_URL: ${VITE_WARRANTY_ACTIVATION_URL:-https://baohanh.simi.vn/kich-hoat-bao-hanh}
        VITE_WARRANTY_LOOKUP_URL: ${VITE_WARRANTY_LOOKUP_URL:-https://baohanh.simi.vn/bao-hanh}
    container_name: uniq-home
    restart: unless-stopped
    ports:
      - '127.0.0.1:${UNIQ_HOME_PORT:-18080}:80'
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--no-verbose',
          '--tries=1',
          '--spider',
          'http://localhost/health',
        ]
      interval: 15s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: '5m'
        max-file: '3'
